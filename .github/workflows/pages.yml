name: Deploy live-UI demo to Pages

# Publishes the full multi-page web/ site to GitHub Pages: landing is the entry
# point (index.html), linking to the live judge, history, and stats pages via
# relative *.html hrefs (which work under the /<repo>/ project-Pages subpath).
# With no backend to connect to, the live page falls back to its built-in
# offline simulator, so the whole flow is clickable as a live demo. Enable once:
#   Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          # Ship every page; landing is the entry point (index.html).
          cp web/landing.html web/live.html web/history.html web/stats.html web/upload.html _site/
          cp web/landing.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
